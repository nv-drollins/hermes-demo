name: hermes-local-inference

services:
  qwen:
    image: ${VLLM_IMAGE:?Set VLLM_IMAGE in inference/.env}
    gpus: all
    ipc: host
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN:?Set HF_TOKEN in inference/.env}
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    command:
      - nvidia/Qwen3.6-35B-A3B-NVFP4
      - --revision
      - 491c2f1ea524c639598bf8fa787a93fed5a6fbce
      - --tokenizer-revision
      - 491c2f1ea524c639598bf8fa787a93fed5a6fbce
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - "1"
      - --trust-remote-code
      - --kv-cache-dtype
      - fp8
      - --attention-backend
      - flashinfer
      - --moe-backend
      - marlin
      - --gpu-memory-utilization
      - "0.4"
      - --max-model-len
      - "262144"
      - --max-num-seqs
      - "4"
      - --max-num-batched-tokens
      - "8192"
      - --enable-chunked-prefill
      - --async-scheduling
      - --enable-prefix-caching
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
      - --load-format
      - fastsafetensors
      - --reasoning-parser
      - qwen3
      - --tool-call-parser
      - qwen3_xml
      - --default-chat-template-kwargs
      - '{"enable_thinking":false}'
      - --enable-auto-tool-choice
    restart: unless-stopped
